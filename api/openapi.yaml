openapi: 3.0.3
info:
  title: CE-RISE Hex Core Service API
  version: 0.1.0
servers:
- url: /
paths:
  /models:
    get:
      responses:
        "200":
          description: OK
      summary: List available models
  /models/{model}/versions/{version}:validate:
    post:
      parameters:
      - explode: false
        in: path
        name: model
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: version
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Validation report
      summary: Validate payload
  /models/{model}/versions/{version}:create:
    post:
      parameters:
      - explode: false
        in: path
        name: model
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: version
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Created/returned record
      summary: Create record
  /models/{model}/versions/{version}:query:
    post:
      parameters:
      - explode: false
        in: path
        name: model
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: version
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Matching records
      summary: Query records
  /admin/health:
    get:
      responses:
        "200":
          description: Alive
      summary: Liveness probe
  /admin/ready:
    get:
      responses:
        "200":
          description: Ready
        "503":
          description: Not ready
      summary: Readiness probe
  /admin/status:
    get:
      responses:
        "200":
          description: Status
      summary: Runtime status
  /admin/metrics:
    get:
      responses:
        "200":
          description: Metrics text
        "404":
          description: Metrics disabled
      summary: Prometheus metrics
components:
  schemas: {}
